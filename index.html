<script>
        // 1. CONFIGURAÇÃO DO SUPABASE (AQUI JÁ COM AS SUAS CHAVES CERTAS)
        const SUPABASE_URL = "https://bkkbyaspzmzgonwxvlcc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ixFc1wuBcJ47PkSG7czu-Q_M9xRC19U";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. Relógio e Data ao Vivo
        setInterval(() => {
            const agora = new Date();
            document.getElementById('live-clock').textContent = agora.toLocaleTimeString('pt-BR');
            document.getElementById('current-date').textContent = agora.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }, 1000);

        // 3. Ligar Câmera Frontal automaticamente
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                streamAtivo = stream;
                video.srcObject = stream;
            })
            .catch(err => {
                console.log("Câmera bloqueada:", err);
                video.classList.add('hidden');
                cameraError.classList.remove('hidden');
            });

        // 4. Capturar Geolocalização
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    coordsGps.lat = pos.coords.latitude;
                    coordsGps.lng = pos.coords.longitude;
                    
                    document.getElementById('badge-geo').className = "text-xs bg-emerald-100 text-emerald-800 px-2.5 py-0.5 rounded-full font-bold";
                    document.getElementById('badge-geo').textContent = "OK";
                    document.getElementById('geo-text').textContent = "Coordenadas capturadas via GPS";
                    document.getElementById('geo-icon').className = "w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600";
                },
                err => {
                    document.getElementById('badge-geo').className = "text-xs bg-rose-100 text-rose-800 px-2.5 py-0.5 rounded-full font-bold";
                    document.getElementById('badge-geo').textContent = "Bloqueado";
                    document.getElementById('geo-text').textContent = "Permissão de GPS negada";
                    document.getElementById('geo-icon').className = "w-8 h-8 rounded-full bg-rose-100 flex items-center justify-center text-rose-600";
                }
            );
        }

        // 5. Bater o Ponto (Envia Foto para o Storage e dados para a Tabela)
        async function registrarPonto(tipo) {
            if (!streamAtivo) {
                return alert("Erro: Permissão de câmera necessária para bater o ponto.");
            }

            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            btnRetake.classList.remove('hidden');

            const agora = new Date();
            const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            canvas.toBlob(async (blob) => {
                const nomeArquivo = `ponto_${Date.now()}.png`;

                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('fotos_ponto')
                    .upload(nomeArquivo, blob, { contentType: 'image/png' });

                if (uploadError) {
                    alert("Erro ao subir imagem: " + uploadError.message);
                    return;
                }

                const { data: publicUrlData } = supabaseClient.storage
                    .from('fotos_ponto')
                    .getPublicUrl(nomeArquivo);

                const dadosPonto = {
                    matricula: "2026-089",
                    tipo_batida: tipo,
                    latitude: coordsGps.lat,
                    longitude: coordsGps.lng,
                    foto_url: publicUrlData.publicUrl
                };

                const { error: dbError } = await supabaseClient
                    .from('registros_ponto')
                    .insert([dadosPonto]);

                if (dbError) {
                    alert("Erro ao gravar dados no banco: " + dbError.message);
                    return;
                }

                let idBotao = "";
                if (tipo === 'Entrada') idBotao = 'status-entrada';
                else if (tipo === 'Saída Pausa') idBotao = 'status-saida-pausa';
                else if (tipo === 'Retorno Pausa') idBotao = 'status-retorno-pausa';
                else if (tipo === 'Saída') idBotao = 'status-saida';

                if (idBotao) {
                    document.getElementById(idBotao).innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i> Batido às ${horaFormatada}`;
                    alert(`Sucesso total! Ponto de [${tipo}] batido com foto e localização salvos com sucesso.`);
                }

            }, 'image/png');
        }

        btnRetake.addEventListener('click', () => {
            canvas.classList.add('hidden');
            video.classList.remove('hidden');
            btnRetake.classList.add('hidden');
        });
    </script>
</body>
</html>
