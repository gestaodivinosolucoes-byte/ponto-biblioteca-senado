<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Ponto - Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 rounded-2xl shadow-md max-w-sm w-full text-center">
        <h1 class="text-xl font-bold text-slate-800 mb-2">Ponto Eletrônico</h1>
        <p class="text-xs text-slate-500 mb-6">Biblioteca do Senado</p>

        <!-- Preview da Câmera -->
        <div class="w-full aspect-[4/3] bg-black rounded-xl overflow-hidden mb-4 flex items-center justify-center text-white text-xs">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
        </div>

        <!-- Botão de Teste -->
        <button onclick="testarClique()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow transition-all">
            ENTRADA (Clique Aqui)
        </button>
    </div>

    <script>
        // Teste de Clique Direto
        function testarClique() {
            alert("O botão funcionou perfeitamente!");
        }

        // Tentar ligar a câmera assim que abrir
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) {
                document.getElementById('webcam').srcObject = stream;
            })
            .catch(function(err) {
                console.log("Erro na câmera: ", err);
            });
    </script>
</body>
</html>
